<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Amanda Carvalho</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      height: 100vh;
    }

    /* Lados com imagens */
    .lado {
      width: 30%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5px;
      padding: 5px;
      background-color: #eee;
    }

    .lado img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 5px;
    }

    /* Centro */
    .centro {
      width: 40%;
      background-color: #123b5c; /* azul marinho */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: black;
    }

    .centro h1 {
      font-size: 28px;
      margin: 10px 0;
    }

    .centro p {
      font-size: 22px;
      margin-bottom: 20px;
    }

    /* Botão */
    .botao {
      background-color: #00aaff;
      border: none;
      padding: 12px 30px;
      font-size: 18px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    .botao:hover {
      background-color: #0088cc;
    }

  </style>
</head>

<body>

  <!-- Lado esquerdo -->
  <div class="lado">
    <img src="banquinho.png.jpeg">
    <img src="HMG (202).jpg">
    <img src="interzinho.png.jpeg">
    <img src="manos.png.jpeg">
  </div>

  <!-- Centro -->
  <div class="centro">
    <h1>Amanda Carvalho</h1>
    <p>21A - Portoá</p>

    <button class="botao">Entrar</button>
  </div>

  <!-- Lado direito -->
  <div class="lado">
    <img src="eu.png.jpeg">
    <img src="meu cabelo.png.jpeg">
    <img src="familia.png.jpeg">
    <img src="fofinha.png.jpeg">
 </div>

</body>
</html>
